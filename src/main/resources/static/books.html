<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книги</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <nav><a href="/">← Главная</a></nav>
    <h1>📖 Книги</h1>

    <div class="actions">
        <a href="/books-form.html" class="btn btn-primary">+ Добавить книгу</a>
    </div>

    <table id="booksTable">
        <thead>
        <tr>
            <th>№</th>
            <th>Название</th>
            <th>Автор</th>
            <th>ISBN</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="pagination" class="pagination"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentPage = parseInt(urlParams.get('page') || '0');
    const pageSize = parseInt(urlParams.get('size') || '10');

    // Функция экранирования для защиты от XSS
    function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    async function loadBooks() {
        const response = await fetch(`/books?pageNumber=${currentPage}&pageSize=${pageSize}`);
        const data = await response.json();

        const tbody = document.querySelector('#booksTable tbody');
        tbody.innerHTML = '';

        if (data.content.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Книги не найдены</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        data.content.forEach((book, index) => {
            // Сквозная нумерация: на странице 0 — строки 1..10, на странице 1 — 11..20 и т.д.
            const rowNumber = currentPage * pageSize + index + 1;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${rowNumber}</td>
                <td>${escapeHtml(book.title)}</td>
                <td>${escapeHtml(book.author)}</td>
                <td>${escapeHtml(book.isbn)}</td>
                <td class="actions-cell">
                    <a href="/books-form.html?id=${book.id}" class="btn btn-small">Редактировать</a>
                </td>
            `;
            tbody.appendChild(row);
        });

        renderPagination(data);
    }

    function renderPagination(data) {
        const pagination = document.getElementById('pagination');
        if (data.totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        if (currentPage > 0) {
            html += `<a href="?page=${currentPage - 1}&size=${pageSize}" class="btn">← Предыдущая</a>`;
        }
        html += `<span class="page-info">Страница ${currentPage + 1} из ${data.totalPages}</span>`;
        if (currentPage < data.totalPages - 1) {
            html += `<a href="?page=${currentPage + 1}&size=${pageSize}" class="btn">Следующая →</a>`;
        }
        pagination.innerHTML = html;
    }

    loadBooks();
</script>
</body>
</html>
